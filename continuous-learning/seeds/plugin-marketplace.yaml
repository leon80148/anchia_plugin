# Cross-Plugin References

## Action
When a plugin naturally chains with other plugins in a workflow, add a
"相關插件" section at the end of SKILL.md listing the workflow steps
and which plugin handles each step.

## Evidence
- Clinical workflow: nhi-ic-card → nhs-pportal-screening → vision-database → nhri-risk-plugin
- Content workflow: health-education-writer → medical-content-team
- Users don't discover these connections on their own

