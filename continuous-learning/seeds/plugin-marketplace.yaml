id: cross-reference-verification
trigger: "same concept described in SKILL.md and reference files"
confidence: 0.95
domain: quality
source: session_observation
evidence: "Round 9: Found critical field name mismatches (tc vs chol, hdl vs hdlc) and wrong JOIN columns between SKILL.md and reference files"
---

# Cross-Reference Verification

## Action
When the same data (field names, thresholds, code examples, eligibility rules)
appears in both SKILL.md and reference files, verify they are identical.
Add a "canonical source" note pointing to the single authoritative file.

## Evidence
- nhri-risk-plugin: SKILL.md used tc/hdl/ldl/fpg but endpoint-contract.md
  used chol/hdlc/ldlc/glu — code examples would fail at runtime
- vision-database: cross-table join documented as DATE/TIME but actual
  columns are IDATE/ITIME and FDATE/FTIME
- nhi-ic-card: SamId mock was 16 chars but spec says 12
- Fixing these 14 lines of bugs was more impactful than 1000+ lines of
  new content added in previous rounds
