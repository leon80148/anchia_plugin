# Traditional Chinese Triggers

## Action
SKILL.md description field must contain Traditional Chinese trigger words
for better discoverability. Include both English and Chinese keywords.

## Evidence
- Project targets Traditional Chinese-speaking users
- Skills without Chinese triggers are harder to discover
- Convention established across all 9+ plugins in marketplace

