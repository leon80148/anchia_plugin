---
id: no-empty-stubs
trigger: "creating reference files in references/ directory"
confidence: 0.95
domain: quality
source: session_observation
evidence: "Round 1 found 2 empty files (platform-formats.md, ab-testing-guide.md)"
---

# No Empty Stubs

## Action
Ensure every .md file in references/ has >= 50 lines of substantial content.
Never create empty placeholder files. If the content is not ready, do not create the file.

## Evidence
- Round 1: Found 2 empty reference files that were created as placeholders
- These empty files provide no value and violate project quality standards

---
id: validate-paths
trigger: "referencing file paths in SKILL.md"
confidence: 0.95
domain: quality
source: session_observation
evidence: "Round 1: viral-app-builder SKILL.md referenced 4 nonexistent files"
---

# Validate Paths

## Action
Before committing, verify all file paths referenced in SKILL.md actually exist.
Use glob to check that every referenced path resolves to a real file.

## Evidence
- Round 1: viral-app-builder SKILL.md referenced 4 files that did not exist
- Broken references confuse users and break skill functionality

