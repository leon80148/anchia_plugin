---

# Failure Diagnosis Over Happy Path

## Action
When adding examples to a skill, prioritize failure diagnosis content
(what goes wrong, how to recognize it, how to fix it) over happy-path
walkthroughs. Users rarely need help with the happy path.

## Evidence
- LoRA training failure diagnosis (4 symptom categories) was the most
  impactful addition to lora-training-prompts
- Discussion stall recovery protocol was the most impactful addition
  to medical-content-team
- Happy-path examples are necessary but failure diagnosis is what
  separates a good skill from a great one

