# Reference Substantive Content

## Action
When expanding a reference file to meet the 50-line minimum, add content that
a real user would actually look up: code examples, decision tables, edge cases,
troubleshooting tables. Never pad with filler text or redundant explanations.

## Evidence
- Round 7: Found 12 reference files in nhri-risk-plugin at 15-39 lines
- All were expanded with substantive content (code skeletons, validation examples,
  CI templates, clinical communication templates)
- The content type should match what users query that reference for

